# docker-compose.yml
#
# Defines HOW to run our Docker container.
# Think of Dockerfile as "what's inside the image"
# and docker-compose.yml as "how to start it".
#
# Run with: docker compose up
# Stop with: docker compose down

services:

  ros2_surgical:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: surgical_peg_transfer

    stdin_open: true
    tty: true

    # ── Display forwarding (Gazebo + RViz GUI) ────────────────
    environment:
      - DISPLAY=${DISPLAY}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR}
      - PULSE_SERVER=${PULSE_SERVER}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - GAZEBO_MODEL_PATH=/ros2_ws/src/surgical_peg_transfer/urdf

    # ── Volume mounts ─────────────────────────────────────────
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg
      - ./ros2_ws/src:/ros2_ws/src
      - ./logs:/tmp/peg_transfer_logs

    # ── Shared memory ─────────────────────────────────────────
    shm_size: '512mb'

    # ── Resource limits ───────────────────────────────────────
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G

    # ── Network ───────────────────────────────────────────────
    network_mode: host

    command: bash
